# 개발 DB 접속값 (PropertySourceConfig 로 로드되어 application-dev.yml 의 ${...} 치환에 사용)
# ※ 여긴 "개발 로컬" 고정값(평문). 운영은 application-prod.yml 이 환경변수(DB_URL 등)로 주입한다.
# ※ 키에 db. 접두사 필수: ${username}/${password} 같은 일반명은 OS 환경변수
#   (Windows USERNAME=ininextHIS 등)와 충돌해 그 값이 우선 적용된다. db.* 로 네임스페이스 분리.

# PostgreSQL (로컬 개발)
db.url=jdbc:postgresql://localhost:5432/cleanhub
db.driver-class-name=org.postgresql.Driver
db.username=cleanhub_user
db.password=1234

# HikariCP 풀 설정
db.minimum-idle=5
db.maximum-pool-size=20
db.idle-timeout=600000
db.connection-timeout=30000
db.connection-test-query=SELECT 1
db.leak-detection-threshold=60000
