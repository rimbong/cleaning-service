<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout_part (title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- 각 페이지의 title이 이곳에 동적으로 삽입됩니다. -->
    <title th:replace="${title}">레이아웃 타이틀</title>

    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Pretendard (한글 친화 모던 폰트) -->
    <link rel="stylesheet" as="style" crossorigin
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">

    <style>
        :root {
            --bg: #0f172a;            /* slate-900 */
            --bg-soft: #1e293b;       /* slate-800 */
            --surface: #ffffff;
            --text: #0f172a;
            --muted: #64748b;
            --border: #e2e8f0;
            --primary: #6366f1;       /* indigo-500 */
            --primary-2: #8b5cf6;     /* violet-500 */
            --accent: #14b8a6;        /* teal-500 */
            --radius: 16px;
            --shadow: 0 10px 30px -12px rgba(2, 6, 23, .25);
        }

        * { box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Pretendard', system-ui, -apple-system, 'Segoe UI', Roboto, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            color: var(--text);
            background:
                radial-gradient(1200px 600px at 100% -10%, rgba(139, 92, 246, .12), transparent 60%),
                radial-gradient(1000px 500px at -10% 0%, rgba(20, 184, 166, .10), transparent 55%),
                #f8fafc;
            min-height: 100vh;
            padding-top: 76px;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== Navbar ===== */
        .app-nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1030;
            height: 64px;
            display: flex; align-items: center;
            padding: 0 1.25rem;
            background: rgba(15, 23, 42, .72);
            backdrop-filter: saturate(180%) blur(14px);
            -webkit-backdrop-filter: saturate(180%) blur(14px);
            border-bottom: 1px solid rgba(255, 255, 255, .08);
        }
        .app-nav .brand {
            display: inline-flex; align-items: center; gap: .6rem;
            color: #fff; text-decoration: none; font-weight: 700; letter-spacing: -.01em;
        }
        .app-nav .brand .logo {
            width: 34px; height: 34px; border-radius: 10px;
            display: grid; place-items: center;
            background: linear-gradient(135deg, var(--primary), var(--primary-2));
            color: #fff; font-size: 1.05rem; box-shadow: 0 6px 16px -6px rgba(99, 102, 241, .8);
        }
        .app-nav .brand small { display: block; font-weight: 500; font-size: .72rem; color: #94a3b8; letter-spacing: .02em; }
        .app-nav .spacer { flex: 1; }
        .app-nav .nav-link-pill {
            color: #cbd5e1; text-decoration: none; font-size: .9rem; font-weight: 500;
            padding: .45rem .85rem; border-radius: 999px; transition: .15s;
            display: inline-flex; align-items: center; gap: .4rem;
        }
        .app-nav .nav-link-pill:hover { color: #fff; background: rgba(255, 255, 255, .1); }

        /* ===== Content niceties (applies to inherited pages) ===== */
        main.container { max-width: 1140px; }

        .b-example-divider {
            height: 2.5rem; margin: 2rem 0;
            background: transparent; border: 0;
            box-shadow: none;
        }

        .page-hero {
            background: linear-gradient(135deg, #111827 0%, #1f2937 45%, #312e81 100%);
            color: #fff; border-radius: var(--radius);
            padding: 2.5rem 2rem; box-shadow: var(--shadow);
            position: relative; overflow: hidden;
        }
        .page-hero::after {
            content: ""; position: absolute; right: -60px; top: -60px;
            width: 220px; height: 220px; border-radius: 50%;
            background: radial-gradient(circle, rgba(139, 92, 246, .45), transparent 70%);
        }
        .page-hero h1 { font-weight: 800; letter-spacing: -.02em; }
        .page-hero .lead { color: #c7d2fe; margin-bottom: 0; }

        .card { border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }
        .card-header { font-weight: 600; }

        .app-footer {
            margin-top: 3rem; padding: 1.5rem 0; text-align: center;
            color: var(--muted); font-size: .85rem;
            border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <!-- 상단 고정 내비게이션 바 -->
    <nav class="app-nav">
        <a class="brand" href="/test">
            <span class="logo"><i class="bi bi-bug-fill"></i></span>
            <span>Spring Boot Lab
                <small>테스트 케이스 콘솔</small>
            </span>
        </a>
        <span class="spacer"></span>
        <a class="nav-link-pill" href="/test"><i class="bi bi-grid-1x2"></i> 허브</a>
        <a class="nav-link-pill" href="/h2-console" target="_blank"><i class="bi bi-database"></i> H2 콘솔</a>
    </nav>

    <!-- 메인 콘텐츠 -->
    <main class="container py-4">
        <!-- 각 페이지의 content가 이곳에 동적으로 삽입됩니다. -->
        <div th:replace="${content}">
            <p>콘텐츠가 여기에 표시됩니다.</p>
        </div>

        <footer class="app-footer">
            Spring Boot 2.7 · 레거시(HIS) 마이그레이션 테스트 베드
        </footer>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
