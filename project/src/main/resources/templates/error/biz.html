<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>처리 오류</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --amber: #f59e0b;
            --text: #0f172a;
            --muted: #64748b;
            --border: #e2e8f0;
            --radius: 16px;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Pretendard', system-ui, -apple-system, 'Malgun Gothic', sans-serif;
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background:
                radial-gradient(1200px 600px at 100% -10%, rgba(245,158,11,.14), transparent 60%),
                radial-gradient(1000px 500px at -10% 0%, rgba(20,184,166,.10), transparent 55%),
                #f8fafc;
        }
        .card-error {
            max-width: 560px;
            width: 100%;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 48px 40px;
            text-align: center;
            box-shadow: 0 20px 50px -12px rgba(15,23,42,.18);
        }
        .icon-badge {
            width: 92px;
            height: 92px;
            margin: 0 auto 24px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            color: #fff;
            background: linear-gradient(135deg, #fbbf24, var(--amber));
            box-shadow: 0 12px 28px -8px rgba(245,158,11,.55);
        }
        .status-title {
            font-size: 32px;
            font-weight: 800;
            margin: 0;
            letter-spacing: -.5px;
            color: var(--text);
        }
        .status-msg {
            font-size: 17px;
            color: var(--muted);
            margin: 16px 0 0;
        }
        .actions {
            margin-top: 32px;
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn { border-radius: 12px; padding: 10px 22px; font-weight: 600; transition: transform .15s ease, box-shadow .15s ease; }
        .btn-warning {
            background: linear-gradient(135deg, #fbbf24, var(--amber));
            border: none;
            color: #fff;
            box-shadow: 0 10px 24px -10px rgba(245,158,11,.7);
        }
        .btn-warning:hover { transform: translateY(-2px); color: #fff; box-shadow: 0 16px 30px -10px rgba(245,158,11,.8); }
        .btn-outline-secondary { border-radius: 12px; }
        .btn-outline-secondary:hover { transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="card-error">
        <div class="icon-badge"><i class="bi bi-exclamation-triangle"></i></div>
        <h1 class="status-title">처리 중 오류 발생</h1>
        <p class="status-msg" th:text="${message}">비즈니스 로직 처리 중 정의된 오류가 발생했습니다.</p>
        <div class="actions">
            <a href="javascript:history.back()" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>이전 페이지로</a>
            <a href="/" class="btn btn-warning"><i class="bi bi-house-door me-1"></i>홈으로 돌아가기</a>
        </div>
    </div>
</body>
</html>
