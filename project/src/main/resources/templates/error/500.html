<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>500 - 서버 내부 오류</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --danger: #ef4444;
            --text: #0f172a;
            --muted: #64748b;
            --border: #e2e8f0;
            --radius: 16px;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Pretendard', system-ui, -apple-system, 'Malgun Gothic', sans-serif;
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background:
                radial-gradient(1200px 600px at 100% -10%, rgba(239,68,68,.12), transparent 60%),
                radial-gradient(1000px 500px at -10% 0%, rgba(139,92,246,.10), transparent 55%),
                #f8fafc;
        }
        .card-error {
            max-width: 560px;
            width: 100%;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 48px 40px;
            text-align: center;
            box-shadow: 0 20px 50px -12px rgba(15,23,42,.18);
        }
        .icon-badge {
            width: 92px;
            height: 92px;
            margin: 0 auto 24px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            color: #fff;
            background: linear-gradient(135deg, #f87171, var(--danger));
            box-shadow: 0 12px 28px -8px rgba(239,68,68,.55);
        }
        .status-code {
            font-size: 72px;
            font-weight: 800;
            line-height: 1;
            margin: 0;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #f87171, var(--danger));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .status-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            margin: 14px 0 8px;
        }
        .status-msg {
            font-size: 16px;
            color: var(--muted);
            margin: 0;
        }
        .actions {
            margin-top: 32px;
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn { border-radius: 12px; padding: 10px 22px; font-weight: 600; transition: transform .15s ease, box-shadow .15s ease; }
        .btn-danger {
            background: linear-gradient(135deg, #f87171, var(--danger));
            border: none;
            box-shadow: 0 10px 24px -10px rgba(239,68,68,.7);
        }
        .btn-danger:hover { transform: translateY(-2px); box-shadow: 0 16px 30px -10px rgba(239,68,68,.8); }
    </style>
</head>
<body>
    <div class="card-error">
        <div class="icon-badge"><i class="bi bi-exclamation-octagon"></i></div>
        <h1 class="status-code" th:text="${code}">500</h1>
        <h2 class="status-title" th:text="${error}">Internal Server Error</h2>
        <p class="status-msg" th:text="${message}">죄송합니다. 서버 처리 중 오류가 발생했습니다.</p>
        <div class="actions">
            <a href="/" class="btn btn-danger"><i class="bi bi-house-door me-1"></i>홈으로 돌아가기</a>
        </div>
    </div>
</body>
</html>
