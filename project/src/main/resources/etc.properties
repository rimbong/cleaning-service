# /src/main/resources/abc.properties
test.value.from.abc=Hello from abc.properties!

# 로그인 진입점(GET /login 직접 접근) 리다이렉트 대상 — 이 프레임워크의 프론트 구성에 맞춰 지정.
#   SPA 구성  : /app       (Vue 라우터가 로그인 화면 처리 — 기본값)
#   SSR 구성  : 실제 로그인 페이지 URL (예: /admin/login 등)
# 부가효과: /login 을 이 컨트롤러가 점유하므로 스프링 기본 자동생성 로그인 폼이 뜨지 않는다.
auth.login-redirect=${AUTH_LOGIN_REDIRECT:/app/}

# 1시간
jwt.access-token-expiration-ms=3600000
# 7일
jwt.refresh-token-expiration-ms=604800000
# refresh 토큰 갱신 정책 (상황에 맞게 선택 — TokenRefreshController 주석 참고)
#   true  = 회전(rotation): 갱신할 때마다 refresh 도 새로 발급(1회용). 탈취 감지 가능,
#           "마지막 사용 후 7일" 비활동 연장형으로 동작 (실무 권장 기본)
#   false = 고정: access 만 갱신, refresh 는 만료(7일)까지 재사용. 단순, 절대 만료형
jwt.refresh-token-rotation=${JWT_REFRESH_ROTATION:true}
# 시크릿: 운영은 반드시 환경변수 JWT_SECRET 로 주입(하드코딩 값은 개발용 기본값). 최소 256bit 이상 권장.
jwt.secret=${JWT_SECRET:TestSecretKeyTestSecretKeyTestSecretKeyTestSecretKey}
# refresh HttpOnly 쿠키의 Secure 속성. 운영(HTTPS)은 env(REFRESH_COOKIE_SECURE=true)로 켜고,
# 개발(http://localhost)은 false(기본) — Secure=true 면 http 로컬에서 쿠키가 전송되지 않는다.
jwt.refresh-cookie.secure=${REFRESH_COOKIE_SECURE:false}

# ===== 파일 업로드 저장소 =====
# 업로드 파일(계약서 첨부 등)을 저장할 루트 디렉터리. 파일시스템 저장 방식.
#   개발: 실행 폴더(project/) 기준 ./uploads (gitignore).
#   운영: 반드시 env FILE_UPLOAD_DIR 로 웹앱 바깥의 안정적인 절대경로 주입(재배포에도 유지되는 위치).
# 도메인별 하위 경로가 자동 생성됨(예: <루트>/contract/<계약ID>/...).
file.upload-dir=${FILE_UPLOAD_DIR:./uploads}

# ===== Mail (SMTP) =====
# 실제 발송하려면 본인 SMTP 정보를 채워야 함.
# 예) Gmail: host=smtp.gmail.com, port=587, auth=true, starttls=true,
#     username=내계정@gmail.com, password=<앱 비밀번호(2단계 인증 후 발급)>
# SMTP 계정/비밀번호는 운영 시 환경변수(MAIL_USERNAME / MAIL_PASSWORD)로 주입. 소스에 평문 저장 금지.
mail.host=${MAIL_HOST:localhost}
mail.port=${MAIL_PORT:25}
mail.username=${MAIL_USERNAME:}
mail.password=${MAIL_PASSWORD:}
mail.smtp.auth=${MAIL_SMTP_AUTH:false}
mail.smtp.starttls=${MAIL_SMTP_STARTTLS:false}
# 보내는 사람(From) 기본값
mail.from=${MAIL_FROM:no-reply@example.com}
